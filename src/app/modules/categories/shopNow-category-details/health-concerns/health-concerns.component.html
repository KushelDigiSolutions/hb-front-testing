<div class="container">
    <div class="row margin-0">
        <!-- <div class="col-lg-3 col-md-4 pb-3 fixed-height filterCol">
            <app-filters [loader]="isFiltersLoading" [categoryData]="filterData" [filterData]="filterUrl"
                [priceSlider]="priceSlider" (newItemEvent)="onFilterChange($event)"></app-filters>
        </div> -->
        @if(desktopScreen){
        <div class="col-lg-3 col-md-4 col-sm-4 pb-3  filterCol grayBorder px-0">
            <app-filters [loader]="isFiltersLoading" [categoryData]="filterData" [filterData]="filterUrl"
                [priceSlider]="priceSlider" (newItemEvent)="onFilterChange($event)"
                (removeFilter)="clearApplyFilter($event)"></app-filters>
        </div>
        }
        @if (true) {
        <!-- Description -->
        <div class="col-lg-9 col-md-8 extended-width pe-0 grayBorder px-0">
            <div class="row min-sm-mx-0 mx-0">
                <div class="col-md-12 px-2 grayBorder">
                    <div class="row category-header mx-0 py-1">
                        <div class="col-md-4 col-sm-4 py-3 mob-category-header px-0">
                            <div class="d-flex align-items-center">
                                <div *ngIf="!desktopScreen">
                                    <i class="bi bi-chevron-left" style="width: 15px;height: 15px;"
                                        (click)="backToHomePage()"></i>
                                </div>
                                <div class="title">
                                    <span>{{ healthConcernDetails?.name }}</span>
                                </div>
                            </div>
                            <div class="search-container" *ngIf="!desktopScreen">
                                <input *ngIf="isExpanded" type="text" [class.expanded]="isExpanded"
                                    placeholder="Search hear...">
                                <button (click)="toggleSearch()">
                                    <img src="../../../../../assets/images/navbar-images/search-normal.png"
                                        alt="Search Icon">
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- <hr class="underline mt-0" /> -->
                <div class="col-md-12 col-sm-12  category-product-container">
                    <!-- mob filter container start -->
                    <div class="mob-filter-container mt-md-1 mt-2 mb-md-0 mb-1" *ngIf="!desktopScreen">
                        <div class="mob-sort-filter-container">
                            <button (click)="openModal('Sort')">
                                <span>
                                    <img class="sort" src="../../../../../assets/images/category-filter/sort.png"
                                        alt="">
                                    Sort by
                                </span>
                                <img src="../../../../../assets/images/category-filter/filter-down-arrow.png" alt=""
                                    class="sort-down-arrow"></button>
                        </div>
                        @for (filter of filterData;track filter) {
                        <div class="mob-category-filter-container">
                            <button (click)=" openModal(filter.name)">{{filter.name}}
                                <img src="../../../../../assets/images/category-filter/filter-down-arrow.png"
                                    alt=""></button>
                        </div>
                        }
                    </div>
                    <!-- mob filter conatiner end -->
                    <div class="category-container ">
                        @if (products.length) {
                        <div class="row">
                            @for (product of products; track $index;) {
                            <div class="col-xl-3 col-lg-4  col-md-6 col-sm-4 col-6">
                                <app-product style="width: 100%;" [product]="product">
                                </app-product>
                            </div>
                            }
                        </div>
                        }

                    </div>
                </div>

                <div class="col-md-12 col-sm-12 py-5" *ngIf="
                    !loader && !products?.length 
                  ">
                    <div class="d-flex justify-content-center">
                        <img class="img-fluid no-product-found mt-3" [src]="imgUrl + 'nothing-found.png'" />
                    </div>
                    <p class="d-flex justify-content-center bold-text pt-3">
                        No Product Found
                    </p>
                </div>
            </div>
        </div>
        }

    </div>
    <hr class="d-none d-md-block">
    <!--  -->
    <!-- <div class="mt-4 px-md-0 px-3">
        <app-affordable-health-packages [package]="affordablePackages"
            [productBrandTitle]="'Related Health packages'"></app-affordable-health-packages>
    </div> -->
    <div class="mt-4 px-md-0 px-3">
        <app-top-consult-specialist [productBrandTitle]="'Consult with our Top specialists'"
            [topConsult]="topConsultLists"></app-top-consult-specialist>
    </div>
    <div class="mt-4 px-md-0 px-3">
        <app-life-style-health-card [productBrandTitle]="'Related Health Tips'"
            [recentTipsData]="relatedTips"></app-life-style-health-card>
    </div>

    <!-- mob filter modal -->
    <!-- Modal -->
    <div class="modal fade" #filterModal id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
        aria-hidden="true">
        <div class="modal-dialog bottom-modal-filter">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                        (click)="closeModal()"></button>
                </div>
                <div class="modal-body">
                    <div class="pb-3 ">
                        <div class="ps-3" *ngIf="modalfilter">
                            <ng-container *ngFor="let item of modalfilter; let i = index">
                                <div *ngIf="item?.name != 'Price Range'">
                                    <div class="d-flex justify-content-between">
                                        <div class="">
                                            <span class="sub-heading-text"> {{ item?.name | titlecase }}</span>
                                        </div>
                                    </div>
                                    <hr>
                                    <div [ngClass]="{'d-none': !item?.detail}" class="category-search mt-2">
                                        <input #search *ngIf="item?.type != 'radio' && !item.hideSearch" type="text"
                                            class="modal-search-bar" [placeholder]="'Search ' + item?.name"
                                            (keyup)="onSearch(search, item)" />

                                        <ul class="ps-0" id="scroll" [ngClass]="{
                              'fixed-height': item?.detail?.length > 10,
                              'pt-3': item?.type != 'radio'
                            }" [style]="{'padding-left': '2px'}">
                                            <li *ngFor="let subItem of item?.detail; let j = index"
                                                class="sub-sub-heading-text pointer"
                                                [ngStyle]="{ color: activeIndex == j ? '#058F46' : '#333333' }"
                                                [ngClass]="{ 'd-none': subItem.hide }">
                                                <label *ngIf="item?.type == 'checkbox'">
                                                    <input type="checkbox" class="me-2"
                                                        (change)="getProductData(item?.filterName,item?.type,subItem?._id || subItem?.value,$event)" />
                                                    <span>
                                                        {{ subItem?.name | titlecase }}
                                                    </span>
                                                </label>
                                                <label *ngIf="item?.type == 'radio'" class="pointer"
                                                    [ngStyle]="{ color: j == radioActiveIndex ? '#058f46' : '' }">
                                                    <input type="radio" [name]="item?.filterName"
                                                        class="form-control d-inline-block me-2 align-middle" (change)="getProductData(
                                                                    item?.filterName,
                                                                    item?.type,
                                                                    subItem?._id || subItem?.value,
                                                                    $event
                                                                );
                                                        setRadioActiveIndex(j)
                                                        ">
                                                    <span class="d-inline-block">{{ subItem?.name | titlecase
                                                        }}</span>
                                                </label>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </ng-container>

                            <!--Range Slider-->
                            <div *ngIf="priceRangeSlider && highValue">
                                <hr class="underline margin-50" />
                                <p class="sub-heading-text">
                                    filter.priceRange
                                </p>
                                <div class="ps-2 pe-2 custom-slider">
                                    <!-- <ngx-slider *ngIf="isBrowser" [(value)]="value" [(highValue)]="highValue"
                                        [options]="options" (valueChange)="minPriceSliderFxn($event)"
                                        (highValueChange)="maxPriceSliderFxn($event)"
                                        (userChangeEnd)="onPriceChangeEnd()"></ngx-slider> -->
                                </div>
                            </div>
                        </div>
                        <!-- <app-filters [loader]="isFiltersLoading" [categoryData]="modalfilter" [filterData]="filterUrl"
                            [priceSlider]="priceSlider" (newItemEvent)="onFilterChange($event)"></app-filters> -->
                    </div>
                </div>
                <div class="modal-footer">
                    <div [style]="{'width':'174px'}">
                        <button type="button" class="btn btn-primary"
                            [style]="{'color':'red','background-color':'#FFFFFF','border-color':'#CBCBCB','width':'100%'}">Clear
                            filters</button>
                    </div>
                    <div [style]="{'width':'174px'}">
                        <button type="button" class="btn btn-primary" (click)="applyFilter()"
                            [style]="{'width':'100%'}">Apply</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- </ng-container> -->
