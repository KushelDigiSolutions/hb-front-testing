<div class="faq-main">
    <div class="faq-rw">
        <h1 class="p-4 faq-title">Frequently Asked Questions</h1>
    </div>
    <div class="container">
        <mat-tab-group animationDuration="0ms" [selectedIndex]="activeTab">
            <mat-tab label="Shop Now">
                <div class="main">
                    <div class="content">
                        <mat-accordion class="example-headers-align" multi>
                            <mat-expansion-panel *ngFor="let faq of shops;">
                                <mat-expansion-panel-header>
                                    <mat-panel-title>
                                        {{faq.title}}
                                    </mat-panel-title>
                                </mat-expansion-panel-header>
                                <p>{{faq.content}}</p>
                            </mat-expansion-panel>
                        </mat-accordion>
                    </div>
                </div>
            </mat-tab>
            <mat-tab label="Consult Us">
                <div class="main">
                    <div class="content">
                        <mat-accordion class="example-headers-align" multi>
                            <mat-expansion-panel *ngFor="let faq of faqs;">
                                <mat-expansion-panel-header>
                                    <mat-panel-title>
                                        {{faq.title}}
                                    </mat-panel-title>

                                </mat-expansion-panel-header>
                                <p>{{faq.content}}</p>
                            </mat-expansion-panel>
                        </mat-accordion>
                    </div>
                </div>
            </mat-tab>
        </mat-tab-group>
    </div>
</div>
