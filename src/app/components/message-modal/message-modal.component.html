<h1 mat-dialog-title [ngClass]="{'text-danger': data.type == 'error', 'textSuccess': data.type == 'success'}">
    {{data.title}}</h1>
<div class="mb-2" mat-dialog-content [innerHTML]="data.message"></div>
<div mat-dialog-actions align="end">
    <button *ngIf="config.confirmCallback" class="btn px-4 py-2 me-2"
        [ngClass]="config.confirmButtonStyleClass || 'btn-primary'"
        (click)="config.confirmCallback()">{{config.confirmButtonText}}</button>
    <button class="btn px-4 py-2" [ngClass]="config.cancelButtonStyleClass || 'btn-light'"
        mat-dialog-close>{{config.closeButtonText}}</button>
</div>
